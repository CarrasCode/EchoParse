services:
  app:
    build: ./Backend/
    container_name: echoparse-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - cache
    volumes:
      - ./Backend/:/code/ # General: monta TODO
      - /code/.venv # Específico: "protege" .venv
      - backend_data:/code/data # Específico: "protege" data

    networks:
      - echoparse-network
  db:
    image: postgres:18.2-alpine3.22
    container_name: echoparse-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - echoparse-network

  cache:
    image: redis:7.4-alpine
    container_name: echoparse-cache
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - echoparse-network

volumes:
  postgres_data:
  redis_data:
  backend_data:

networks:
  echoparse-network:
    driver: bridge
