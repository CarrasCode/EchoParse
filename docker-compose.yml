services:
  migrate:
    build:
      context: ./Backend
      dockerfile: Dockerfile.api
    container_name: echoparse-migrations
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./Backend/:/code/ # General: monta TODO
      - /code/.venv # Específico: "protege" .venv
      - backend_data:/code/data # Específico: "protege" data
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    networks:
      - echoparse-network

  app:
    build:
      context: ./Backend
      dockerfile: Dockerfile.api
    container_name: echoparse-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./Backend/:/code/ # General: monta TODO
      - /code/.venv # Específico: "protege" .venv
      - backend_data:/code/data # Específico: "protege" data

    networks:
      - echoparse-network
  db:
    image: postgres:18.2-alpine3.22
    container_name: echoparse-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - echoparse-network

  cache:
    image: redis:7.4-alpine
    container_name: echoparse-cache
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - echoparse-network
  worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile.worker
    container_name: echoparse-worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./Backend/:/code/ # General: monta TODO
      - /code/.venv # Específico: "protege" .venv
      - backend_data:/code/data # Específico: "protege" data
    networks:
      - echoparse-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    container_name: echoparse-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./Frontend:/app
      # Esto previene que tus node_modules locales sobreescriban los del contenedor
      - frontend_node_modules:/app/node_modules
    networks:
      - echoparse-network
    depends_on:
      app:
        condition: service_healthy

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  backend_data:

networks:
  echoparse-network:
    driver: bridge
